{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-8">
    <div class="card shadow-sm">
      <div class="card-body">
        <h2 class="h4 mb-3">Fingerprint Verification</h2>
        <form method="post" enctype="multipart/form-data">
          <div class="mb-3">
            <label class="form-label">Case Title</label>
            <input type="text" class="form-control" name="title" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Category</label>
            <select class="form-select" name="category">
              <option>Fingerprint</option>
              <option>Latent Print</option>
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label">Case Summary</label>
            <textarea class="form-control" name="summary" rows="4"></textarea>
          </div>
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label">Reference Print</label>
              <input class="form-control" type="file" name="fingerprint_a" accept="image/*" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">Candidate Print</label>
              <input class="form-control" type="file" name="fingerprint_b" accept="image/*" required>
            </div>
          </div>
          <button class="btn btn-primary mt-4" type="submit">Compare Fingerprints</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
